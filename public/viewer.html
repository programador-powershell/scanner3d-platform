<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador 3D GLB - Padrão AAA</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0b0c;
            color: #e4e4e7;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(18, 18, 20, 0.75);
            padding: 24px;
            border-radius: 16px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            width: 280px;
            z-index: 10;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
        }
        h3 {
            margin-top: 0;
            margin-bottom: 16px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #a1a1aa;
            font-weight: 700;
        }
        .control-group {
            margin-bottom: 20px;
        }
        .label {
            font-size: 11px;
            color: #71717a;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: block;
            letter-spacing: 0.5px;
        }
        button {
            background: rgba(255, 255, 255, 0.04);
            color: #f4f4f5;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px;
            margin: 4px 0;
            width: 100%;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            font-size: 13px;
            text-align: left;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s ease;
        }
        button:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
        }
        button.active {
            background: #22d3ee;
            color: #09090b;
            border-color: #22d3ee;
            font-weight: 600;
            box-shadow: 0 0 15px rgba(34, 211, 238, 0.3);
        }
        select {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            color: #f4f4f5;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 11px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
        }
        .nav {
            display: flex;
            gap: 14px;
            margin-bottom: 18px;
            font-size: 12px;
        }
        .nav a { color: #71717a; text-decoration: none; }
        .nav a:hover { color: #22d3ee; }
        #drop-zone {
            position: absolute;
            bottom: 24px;
            right: 24px;
            background: rgba(18, 18, 20, 0.6);
            border: 1px dashed rgba(255, 255, 255, 0.2);
            padding: 16px 24px;
            border-radius: 12px;
            font-size: 13px;
            color: #a1a1aa;
            backdrop-filter: blur(10px);
            z-index: 10;
            pointer-events: none;
            transition: all 0.3s ease;
        }
        .info-panel {
            font-size: 12px;
            color: #71717a;
            line-height: 1.6;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 16px;
            margin-top: 16px;
        }
        #mesh-info {
            font-family: monospace;
            color: #22d3ee;
            margin-top: 8px;
            font-size: 11px;
        }
        #loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #0b0b0c;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
            pointer-events: none;
            opacity: 0;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(34, 211, 238, 0.1);
            border-top-color: #22d3ee;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
        }
      }
    </script>
</head>
<body>
    <div id="loading-overlay">
        <div class="spinner"></div>
        <div style="font-size: 14px; color: #a1a1aa;">Processando Geometria...</div>
    </div>

    <div id="ui-container">
        <h3>Engine Render Pro</h3>

        <div class="nav">
            <a href="/">ingestão</a>
            <a href="/pipeline.html">pipeline</a>
            <a href="/assetpack.html">asset pack</a>
        </div>

        <div class="control-group">
            <span class="label">Modelo (enviados via upload)</span>
            <select id="model-picker"><option value="">— arraste um .glb ou escolha —</option></select>
        </div>

        <div class="control-group">
            <span class="label">Modos de Visualização</span>
            <button id="btn-textured" class="active">Render Completo (PBR) <span>●</span></button>
            <button id="btn-solid">Modo Sólido (Clay) <span></span></button>
            <button id="btn-wireframe">Topologia (Wireframe) <span></span></button>
        </div>

        <div class="control-group">
            <span class="label">Câmera e Órbita</span>
            <button id="btn-autorotate">Auto Rotação 360° <span id="status-rotate">OFF</span></button>
        </div>

        <div class="info-panel">
            <div>💡 Arraste qualquer arquivo <strong>.glb</strong> na janela para inspecionar a malha e texturas.</div>
            <div id="mesh-info">Aguardando arquivo...</div>
        </div>
    </div>

    <div id="canvas-container"></div>
    <div id="drop-zone">Arraste um arquivo .glb aqui</div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

        let scene, camera, renderer, controls, currentModel;
        let currentMode = 'textured';
        let autoRotate = false;
        let originalMaterials = new Map();

        const clayMaterial = new THREE.MeshStandardMaterial({
            color: 0x909094,
            roughness: 0.6,
            metalness: 0.0,
            flatShading: false
        });

        const loaderOverlay = document.getElementById('loading-overlay');

        function init() {
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0e0e10);
            scene.fog = new THREE.FogExp2(0x0e0e10, 0.015);

            // Camera
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 2, 4);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.0;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Ambiente PBR (reflexos realistas para o material da IA)
            const pmrem = new THREE.PMREMGenerator(renderer);
            scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

            // Controls
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2 + 0.1; // Evita passar do chão de forma brusca

            // Lighting Estúdio AAA
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);

            const keyLight = new THREE.DirectionalLight(0xffffff, 2.0);
            keyLight.position.set(5, 8, 5);
            keyLight.castShadow = true;
            keyLight.shadow.mapSize.width = 2048;
            keyLight.shadow.mapSize.height = 2048;
            keyLight.shadow.bias = -0.0001;
            scene.add(keyLight);

            const fillLight = new THREE.DirectionalLight(0xa5b4fc, 0.8); // Tom levemente azulado para as sombras
            fillLight.position.set(-5, 4, 3);
            scene.add(fillLight);

            const rimLight = new THREE.DirectionalLight(0xffffff, 1.5); // Luz de recorte traseira
            rimLight.position.set(0, 6, -6);
            scene.add(rimLight);

            // Chão de Estúdio Infinito
            const floorGeo = new THREE.PlaneGeometry(50, 50);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x121214, roughness: 0.8, metalness: 0.1 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            // Grid discreto
            const grid = new THREE.GridHelper(20, 20, 0x22d3ee, 0x27272a);
            grid.position.y = 0.001;
            grid.material.opacity = 0.15;
            grid.material.transparent = true;
            scene.add(grid);

            window.addEventListener('resize', onWindowResize);
            setupDragAndDrop();
            setupUI();
            loadModelList();
            // deep-link: /viewer.html?model=/uploads/x.glb
            const qp = new URLSearchParams(location.search).get('model');
            if (qp) loadGLB(qp);
            animate();
        }

        async function loadModelList() {
            try {
                const r = await fetch('/api/models');
                const { models } = await r.json();
                const sel = document.getElementById('model-picker');
                for (const m of models) {
                    const o = document.createElement('option');
                    o.value = m.url; o.textContent = m.name;
                    sel.appendChild(o);
                }
                sel.addEventListener('change', () => { if (sel.value) loadGLB(sel.value); });
            } catch {}
        }

        function loadGLB(url) {
            loaderOverlay.style.opacity = '1';

            if (currentModel) scene.remove(currentModel);
            originalMaterials.clear();

            const loader = new GLTFLoader();
            loader.load(url, (gltf) => {
                currentModel = gltf.scene;

                let vertexCount = 0;
                let faceCount = 0;

                currentModel.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;

                        // Guarda o material PBR original gerado pela IA
                        originalMaterials.set(child.uuid, child.material);

                        if (child.geometry) {
                            vertexCount += child.geometry.attributes.position.count;
                            if (child.geometry.index) {
                                faceCount += child.geometry.index.count / 3;
                            } else {
                                faceCount += child.geometry.attributes.position.count / 3;
                            }
                        }
                    }
                });

                // Enquadramento e Centralização Inteligente da Câmera
                const box = new THREE.Box3().setFromObject(currentModel);
                const center = box.getCenter(new THREE.Vector3());
                const size = box.getSize(new THREE.Vector3());

                currentModel.position.x -= center.x;
                currentModel.position.y -= box.min.y; // Trava o pé no chão 0
                currentModel.position.z -= center.z;

                const maxDim = Math.max(size.x, size.y, size.z) || 1;
                camera.position.set(0, maxDim * 0.8, maxDim * 2.0);
                controls.target.set(0, maxDim * 0.5, 0);
                camera.lookAt(0, maxDim * 0.5, 0);

                scene.add(currentModel);
                applyMode();

                document.getElementById('mesh-info').innerHTML = `POLYCOUNT:<br>Vértices: ${vertexCount.toLocaleString()}<br>Polígonos: ${Math.round(faceCount).toLocaleString()}`;

                setTimeout(() => { loaderOverlay.style.opacity = '0'; }, 300);
            }, undefined, (error) => {
                console.error(error);
                alert("Erro ao ler o arquivo GLB.");
                loaderOverlay.style.opacity = '0';
            });
        }

        function applyMode() {
            if (!currentModel) return;
            currentModel.traverse((child) => {
                if (child.isMesh) {
                    if (currentMode === 'textured') {
                        child.material = originalMaterials.get(child.uuid);
                        child.material.wireframe = false;
                    } else if (currentMode === 'solid') {
                        child.material = clayMaterial;
                        child.material.wireframe = false;
                    } else if (currentMode === 'wireframe') {
                        child.material = clayMaterial;
                        child.material.wireframe = true;
                    }
                }
            });
        }

        function setupUI() {
            const btns = {
                textured: document.getElementById('btn-textured'),
                solid: document.getElementById('btn-solid'),
                wireframe: document.getElementById('btn-wireframe')
            };

            function updateBtnState(activeKey) {
                Object.keys(btns).forEach(key => {
                    if(key === activeKey) {
                        btns[key].classList.add('active');
                        btns[key].querySelector('span').innerText = '●';
                    } else {
                        btns[key].classList.remove('active');
                        btns[key].querySelector('span').innerText = '';
                    }
                });
            }

            btns.textured.addEventListener('click', () => { currentMode = 'textured'; applyMode(); updateBtnState('textured'); });
            btns.solid.addEventListener('click', () => { currentMode = 'solid'; applyMode(); updateBtnState('solid'); });
            btns.wireframe.addEventListener('click', () => { currentMode = 'wireframe'; applyMode(); updateBtnState('wireframe'); });

            const btnRotate = document.getElementById('btn-autorotate');
            btnRotate.addEventListener('click', () => {
                autoRotate = !autoRotate;
                document.getElementById('status-rotate').innerText = autoRotate ? 'ON' : 'OFF';
                btnRotate.style.borderColor = autoRotate ? '#22d3ee' : 'rgba(255, 255, 255, 0.1)';
                btnRotate.style.color = autoRotate ? '#22d3ee' : '#f4f4f5';
            });
        }

        function setupDragAndDrop() {
            window.addEventListener('dragover', (e) => {
                e.preventDefault();
                document.getElementById('drop-zone').style.borderColor = '#22d3ee';
                document.getElementById('drop-zone').style.color = '#22d3ee';
            });

            window.addEventListener('dragleave', (e) => {
                e.preventDefault();
                document.getElementById('drop-zone').style.borderColor = 'rgba(255, 255, 255, 0.2)';
                document.getElementById('drop-zone').style.color = '#a1a1aa';
            });

            window.addEventListener('drop', (e) => {
                e.preventDefault();
                document.getElementById('drop-zone').style.borderColor = 'rgba(255, 255, 255, 0.2)';
                document.getElementById('drop-zone').style.color = '#a1a1aa';

                const file = e.dataTransfer.files[0];
                if (file && file.name.toLowerCase().endsWith('.glb')) {
                    const url = URL.createObjectURL(file);
                    loadGLB(url);
                } else {
                    alert("Por favor, arraste apenas arquivos de formato .GLB");
                }
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (autoRotate && currentModel) {
                currentModel.rotation.y += 0.004;
            }
            controls.update();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
