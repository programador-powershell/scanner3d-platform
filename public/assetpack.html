<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Asset Pack 3D</title>
<style>
  :root{--bg:#f4f5f7;--ink:#1a1d24;--muted:#6b7280;--line:#e3e6ea;--accent:#6d5efc;--accent2:#21c39a}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
  header{position:sticky;top:0;z-index:5;background:rgba(244,245,247,.85);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:14px 22px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  header h1{font-size:1.15rem;font-weight:700}
  header h1 span{background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent}
  header a{color:var(--muted);text-decoration:none;font-size:.85rem}
  header a:hover{color:var(--accent)}
  .bar{display:flex;gap:10px;align-items:center;padding:16px 22px;flex-wrap:wrap}
  .bar input[type=text]{flex:1;min-width:240px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:13px 16px;font-size:1rem;color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.03)}
  .bar input:focus{outline:none;border-color:var(--accent)}
  .bar select{background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px;color:var(--ink)}
  button{border:none;border-radius:12px;padding:13px 22px;font-size:1rem;font-weight:600;cursor:pointer;background:linear-gradient(90deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 14px rgba(109,94,252,.3)}
  button:disabled{opacity:.55;cursor:wait}
  .hint{padding:0 22px 8px;color:var(--muted);font-size:.82rem}
  #board{position:relative;min-height:60vh;padding:22px;margin:0 auto;max-width:1300px}
  .card{position:absolute;width:150px;height:150px;background:#fff;border-radius:18px;box-shadow:0 10px 24px rgba(20,24,40,.10),0 2px 6px rgba(20,24,40,.06);display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:pointer;opacity:0;transform:scale(.6) rotate(0deg);transition:opacity .4s ease,transform .45s cubic-bezier(.2,.9,.3,1.3),box-shadow .2s}
  .card.in{opacity:1}
  .card:hover{box-shadow:0 18px 40px rgba(20,24,40,.18);z-index:3}
  .card img{width:100%;height:100%;object-fit:contain;pointer-events:none}
  .card .tag{position:absolute;bottom:6px;left:8px;font-size:.62rem;color:var(--muted);background:rgba(255,255,255,.7);padding:1px 6px;border-radius:6px}
  #empty{padding:60px 22px;text-align:center;color:var(--muted)}
  #count{font-size:.82rem;color:var(--muted);padding:0 22px 12px}
  /* modal */
  #modal{position:fixed;inset:0;background:rgba(20,24,40,.55);display:none;align-items:center;justify-content:center;z-index:20}
  #modal .box{background:#fff;border-radius:20px;padding:14px;width:min(92vw,560px)}
  #modalCanvasWrap{width:100%;aspect-ratio:1/1;background:#fafafa;border-radius:14px;overflow:hidden}
  #modal h3{margin:10px 4px 2px;font-size:1rem}
  #modal .row{display:flex;justify-content:space-between;align-items:center;margin-top:8px;gap:10px}
  #modal .ghost{background:#eef0f4;color:var(--ink);box-shadow:none;font-size:.85rem;padding:9px 14px}
  #toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#fff;border:1px solid var(--line);box-shadow:0 8px 24px rgba(0,0,0,.12);padding:10px 18px;border-radius:12px;display:none;z-index:30}
</style>
</head>
<body>
<header>
  <h1>🍃 Gerador de <span>Asset Pack 3D</span></h1>
  <a href="/">ingestão</a>
  <a href="/pipeline.html">pipeline</a>
  <span style="margin-left:auto;color:var(--muted);font-size:.82rem">1 prompt → vários assets 3D</span>
</header>

<div class="bar">
  <input type="text" id="prompt" placeholder="ex.: pacote de veículos pós-apocalípticos · móveis mid-century · personagens estilo Mario Kart">
  <select id="count">
    <option>8</option><option>12</option><option selected>20</option><option>28</option>
  </select>
  <button id="gen">Gerar assets</button>
</div>
<div class="hint">Cada card é um asset 3D renderizado no navegador (three.js). Clique para ver em 3D · o mesmo prompt sempre gera o mesmo pacote.</div>
<div id="count"></div>
<div id="board"><div id="empty">Digite um prompt e clique em <b>Gerar assets</b>.</div></div>

<div id="modal"><div class="box">
  <div id="modalCanvasWrap"><canvas id="modalCanvas"></canvas></div>
  <h3 id="modalTitle"></h3>
  <div class="row"><span class="muted" id="modalSub" style="color:var(--muted);font-size:.82rem"></span>
    <div><button class="ghost" id="toPipeline">Abrir no pipeline →</button> <button class="ghost" id="closeModal">Fechar</button></div>
  </div>
</div></div>

<div id="toast"></div>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const $=s=>document.querySelector(s);
function toast(m){const t=$('#toast');t.textContent=m;t.style.display='block';clearTimeout(t._h);t._h=setTimeout(()=>t.style.display='none',2600);}

// RNG determinístico (prompt → pacote estável)
function hashStr(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}

// ---------- renderer offscreen (fundo transparente, 1 asset por vez) ----------
const RS=320;
const offCanvas=document.createElement('canvas');offCanvas.width=offCanvas.height=RS;
const renderer=new THREE.WebGLRenderer({canvas:offCanvas,antialias:true,alpha:true,preserveDrawingBuffer:true});
renderer.setSize(RS,RS,false);
const cam=new THREE.PerspectiveCamera(38,1,0.1,100);cam.position.set(2.4,1.7,3.0);cam.lookAt(0,0.6,0);
function makeScene(){const s=new THREE.Scene();s.add(new THREE.HemisphereLight(0xffffff,0xcfd6e4,1.25));const d=new THREE.DirectionalLight(0xffffff,1.9);d.position.set(3,6,4);s.add(d);const d2=new THREE.DirectionalLight(0xeef0ff,0.5);d2.position.set(-4,2,-2);s.add(d2);return s;}
function mat(c,o={}){return new THREE.MeshStandardMaterial({color:c,roughness:o.r??0.6,metalness:o.m??0.15});}
const PAL=[0x6d5efc,0x21c39a,0xf4a23b,0xef5d8a,0x4db5ff,0x8b5cf6,0x34d399,0xf87171,0xa3a3a3,0x7c8a99];

// ---------- arquétipos de asset (variados por seed) ----------
function assetHumanoid(g,rnd){const sk=new THREE.Color().setHSL(0.06+rnd()*0.05,0.4,0.6+rnd()*0.1).getHex();const mu=0.8+rnd()*0.5;
  const t=new THREE.Mesh(new THREE.CapsuleGeometry(0.24*mu,0.45,6,12),mat(sk));t.position.y=0.95;t.scale.z=0.7;g.add(t);
  const h=new THREE.Mesh(new THREE.SphereGeometry(0.16,20,20),mat(sk));h.position.y=1.5;g.add(h);
  const col=PAL[Math.floor(rnd()*PAL.length)];
  for(const s of[-1,1]){const a=new THREE.Mesh(new THREE.CapsuleGeometry(0.07,0.45,5,10),mat(sk));a.position.set(s*0.33,0.95,0);g.add(a);
    const l=new THREE.Mesh(new THREE.CapsuleGeometry(0.09,0.5,5,10),mat(col));l.position.set(s*0.12,0.3,0);g.add(l);}
  return 'personagem';}
function assetVehicle(g,rnd){const col=PAL[Math.floor(rnd()*PAL.length)];
  const body=new THREE.Mesh(new THREE.BoxGeometry(1.1,0.34,0.55),mat(col,{m:0.4,r:0.4}));body.position.y=0.45;g.add(body);
  const cab=new THREE.Mesh(new THREE.BoxGeometry(0.5,0.3,0.5),mat(col,{m:0.4,r:0.4}));cab.position.set(-0.05,0.74,0);g.add(cab);
  for(const x of[-0.38,0.38])for(const z of[-0.32,0.32]){const w=new THREE.Mesh(new THREE.CylinderGeometry(0.16,0.16,0.12,16),mat(0x222831,{r:0.7}));w.rotation.x=Math.PI/2;w.position.set(x,0.22,z);g.add(w);}
  return 'veículo';}
function assetFurniture(g,rnd){const col=new THREE.Color().setHSL(0.08+rnd()*0.1,0.3,0.55).getHex();const kind=Math.floor(rnd()*3);
  if(kind===0){const seat=new THREE.Mesh(new THREE.BoxGeometry(1.0,0.18,0.45),mat(col));seat.position.y=0.5;g.add(seat);const back=new THREE.Mesh(new THREE.BoxGeometry(1.0,0.4,0.12),mat(col));back.position.set(0,0.72,-0.18);g.add(back);}
  else if(kind===1){const top=new THREE.Mesh(new THREE.CylinderGeometry(0.55,0.55,0.06,28),mat(0xf2efe9,{r:0.5}));top.position.y=0.7;g.add(top);const leg=new THREE.Mesh(new THREE.CylinderGeometry(0.07,0.12,0.7,16),mat(0xcfcfcf,{m:0.3}));leg.position.y=0.35;g.add(leg);}
  else{const sh=new THREE.Mesh(new THREE.BoxGeometry(0.9,0.9,0.3),mat(col));sh.position.y=0.55;g.add(sh);for(let i=0;i<3;i++){const d=new THREE.Mesh(new THREE.BoxGeometry(0.92,0.04,0.32),mat(0x3a2f25));d.position.set(0,0.2+i*0.32,0);g.add(d);}}
  return 'móvel';}
function assetProp(g,rnd){const col=PAL[Math.floor(rnd()*PAL.length)];const kind=Math.floor(rnd()*3);
  if(kind===0){const base=new THREE.Mesh(new THREE.CylinderGeometry(0.18,0.22,0.08,20),mat(0x888,{m:0.5}));base.position.y=0.04;g.add(base);const pole=new THREE.Mesh(new THREE.CylinderGeometry(0.03,0.03,0.9,12),mat(0x999,{m:0.6}));pole.position.y=0.5;g.add(pole);const shade=new THREE.Mesh(new THREE.ConeGeometry(0.3,0.3,20,1,true),mat(0xf6e7c5,{r:0.4}));shade.position.y=0.95;g.add(shade);}
  else if(kind===1){const c=new THREE.Mesh(new THREE.TorusKnotGeometry(0.32,0.11,80,12),mat(col,{m:0.5,r:0.3}));c.position.y=0.7;g.add(c);}
  else{const r=new THREE.Mesh(new THREE.IcosahedronGeometry(0.45,0),mat(col,{m:0.3,r:0.45}));r.position.y=0.6;g.add(r);}
  return 'prop';}
const ARCHETYPES=[assetHumanoid,assetVehicle,assetFurniture,assetProp];

function renderAsset(seed){
  const scene=makeScene();const g=new THREE.Group();scene.add(g);
  const rnd=mulberry32(seed);
  const kind=ARCHETYPES[Math.floor(rnd()*ARCHETYPES.length)];
  const label=kind(g,rnd);
  g.rotation.y=(rnd()-0.5)*1.4;
  // enquadra
  const box=new THREE.Box3().setFromObject(g);const c=box.getCenter(new THREE.Vector3());const sz=box.getSize(new THREE.Vector3());
  const r=Math.max(sz.x,sz.y,sz.z);cam.position.set(c.x+r*1.6,c.y+r*1.1,c.z+r*1.9);cam.lookAt(c);
  renderer.render(scene,cam);
  const url=offCanvas.toDataURL('image/png');
  scene.traverse(o=>{if(o.geometry)o.geometry.dispose();if(o.material)(Array.isArray(o.material)?o.material:[o.material]).forEach(m=>m.dispose());});
  return {url,label};
}

// ---------- layout em scatter ----------
let lastPack=null;
function generate(){
  const prompt=$('#prompt').value.trim();
  if(!prompt) return toast('Digite um prompt.');
  const n=parseInt($('#count').value,10);
  const base=hashStr(prompt);
  $('#gen').disabled=true;
  const board=$('#board');board.innerHTML='';
  // grid base com jitter+rotação (visual "asset pack" espalhado)
  const cols=Math.min(8,Math.max(4,Math.round(Math.sqrt(n)*1.4)));
  const cellW=170,cellH=168;const pad=10;
  board.style.minHeight=(Math.ceil(n/cols)*cellH+80)+'px';
  const items=[];
  for(let i=0;i<n;i++){
    const seed=base ^ Math.imul(i+1,2654435761);
    const {url,label}=renderAsset(seed>>>0);
    const rnd=mulberry32(seed^0x9e3779b9);
    const col=i%cols, row=Math.floor(i/cols);
    const jx=(rnd()-0.5)*46, jy=(rnd()-0.5)*40, rot=(rnd()-0.5)*16;
    const card=document.createElement('div');card.className='card';
    card.style.left=(col*cellW+pad+jx)+'px';card.style.top=(row*cellH+pad+jy)+'px';
    card.style.setProperty('--rot',rot+'deg');
    const img=document.createElement('img');img.src=url;img.alt=label;
    const tag=document.createElement('span');tag.className='tag';tag.textContent=label;
    card.append(img,tag);
    card.addEventListener('click',()=>openModal(seed>>>0,label,prompt,i));
    board.appendChild(card);
    items.push({card,rot});
  }
  lastPack={prompt,n};
  $('#count').textContent=`${n} assets gerados para: "${prompt}"`;
  // pop-in escalonado
  items.forEach((it,i)=>setTimeout(()=>{it.card.classList.add('in');it.card.style.transform=`scale(1) rotate(${it.rot}deg)`;},i*45));
  $('#gen').disabled=false;
}

// ---------- modal 3D vivo ----------
const mRenderer=new THREE.WebGLRenderer({canvas:$('#modalCanvas'),antialias:true,alpha:true});
const mCam=new THREE.PerspectiveCamera(40,1,0.1,100);
const mControls=new OrbitControls(mCam,$('#modalCanvas'));mControls.enableDamping=true;mControls.autoRotate=true;mControls.autoRotateSpeed=2.2;
let mScene=null,mSeed=null,mLabel='',mPrompt='';
function sizeModal(){const w=$('#modalCanvasWrap').clientWidth;mRenderer.setSize(w,w,false);mCam.aspect=1;mCam.updateProjectionMatrix();}
function mLoop(){requestAnimationFrame(mLoop);if($('#modal').style.display==='flex'){mControls.update();if(mScene)mRenderer.render(mScene,mCam);}}
mLoop();
function openModal(seed,label,prompt,idx){
  mSeed=seed;mLabel=label;mPrompt=prompt;
  mScene=makeScene();const g=new THREE.Group();mScene.add(g);
  const rnd=mulberry32(seed);ARCHETYPES[Math.floor(rnd()*ARCHETYPES.length)](g,rnd);
  const box=new THREE.Box3().setFromObject(g);const c=box.getCenter(new THREE.Vector3());const sz=box.getSize(new THREE.Vector3());const r=Math.max(sz.x,sz.y,sz.z);
  mCam.position.set(c.x+r*1.8,c.y+r*1.2,c.z+r*2.0);mControls.target.copy(c);
  $('#modalTitle').textContent=`${label} #${idx+1}`;
  $('#modalSub').textContent=`prompt: "${prompt}"`;
  $('#modal').style.display='flex';sizeModal();
}
$('#closeModal').addEventListener('click',()=>$('#modal').style.display='none');
$('#modal').addEventListener('click',e=>{if(e.target.id==='modal')$('#modal').style.display='none';});
$('#toPipeline').addEventListener('click',()=>{location.href='/pipeline.html';});
window.addEventListener('resize',()=>{if($('#modal').style.display==='flex')sizeModal();});

$('#gen').addEventListener('click',generate);
$('#prompt').addEventListener('keydown',e=>{if(e.key==='Enter')generate();});
</script>
</body>
</html>
